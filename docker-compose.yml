version: "3.9"

services:
  montana:
    build: .
    container_name: montana-sistema
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - .env
    volumes:
      # Dados persistentes — ficam na máquina host, não dentro do container
      - ./data:/app/data
      - ./certificados:/app/certificados
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
