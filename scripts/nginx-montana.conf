# ═══════════════════════════════════════════════════════════════════
#  Nginx — Montana App Unificado
#  Domínio: sistema.grupomontanasec.com
#  Colocar em: /etc/nginx/sites-available/montana
# ═══════════════════════════════════════════════════════════════════

# Redireciona HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name sistema.grupomontanasec.com;

    # Necessário para renovação automática do certificado SSL
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sistema.grupomontanasec.com;

    # Certificado SSL (gerado pelo certbot)
    ssl_certificate     /etc/letsencrypt/live/sistema.grupomontanasec.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sistema.grupomontanasec.com/privkey.pem;

    # Configurações SSL seguras
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # Headers de segurança
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logs
    access_log /var/log/nginx/montana-access.log;
    error_log  /var/log/nginx/montana-error.log;

    # Upload máximo (importação Excel, PDFs)
    client_max_body_size 30M;

    # Timeout para exports grandes (Excel/PDF com muitos dados)
    proxy_read_timeout    300s;
    proxy_connect_timeout  60s;
    proxy_send_timeout    300s;

    # ── MCP Server (SSE) — acesso protegido por senha ──────────────
    # Apenas o usuário "diretoria" tem acesso (htpasswd)
    location /mcp/ {
        auth_basic           "Montana MCP — Acesso Restrito";
        auth_basic_user_file /etc/nginx/.htpasswd-mcp;

        # SSE precisa de conexão longa sem buffer
        proxy_pass         http://127.0.0.1:3010/;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE: desabilitar buffering para streaming em tempo real
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;   # 24h — conexão SSE é longa
        chunked_transfer_encoding off;
    }

    # Proxy para o Node.js
    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
