{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nevada & Montreal ERP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="login-page">
        <div class="login-box">
            <h1>Nevada & Montreal</h1>
            <p class="subtitle">Sistema ERP - Grupo Montana</p>
            <div class="empresas-badge">
                <span class="badge-nevada">Nevada</span>
                <span class="badge-montreal">Montreal</span>
            </div>

            {% if form.errors %}
            <div class="alert alert-danger">
                Usuario ou senha invalidos. Tente novamente.
            </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_username">Usuario</label>
                    <input type="text" name="username" id="id_username" class="form-control" placeholder="Seu usuario" autofocus required>
                </div>
                <div class="form-group">
                    <label for="id_password">Senha</label>
                    <input type="password" name="password" id="id_password" class="form-control" placeholder="Sua senha" required>
                </div>
                <input type="hidden" name="next" value="{{ next }}">
                <button type="submit" class="btn btn-primary btn-lg btn-block" style="margin-top: 8px;">
                    Entrar
                </button>
            </form>
        </div>
    </div>
</body>
</html>
