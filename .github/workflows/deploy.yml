name: Deploy Montana App + MCP Server

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'public/**'
      - 'mcp-server/**'
      - 'package.json'
      - 'ecosystem.config.js'

jobs:
  deploy:
    name: Deploy para GCP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_montana
          chmod 600 ~/.ssh/id_montana
          ssh-keyscan -H 104.196.22.170 >> ~/.ssh/known_hosts

      - name: Enviar App Montana
        run: |
          scp -i ~/.ssh/id_montana -r src/     diretoria@104.196.22.170:/opt/montana/app_unificado/
          scp -i ~/.ssh/id_montana -r public/  diretoria@104.196.22.170:/opt/montana/app_unificado/
          scp -i ~/.ssh/id_montana    package.json diretoria@104.196.22.170:/opt/montana/app_unificado/
          scp -i ~/.ssh/id_montana    ecosystem.config.js diretoria@104.196.22.170:/opt/montana/app_unificado/

      - name: Enviar MCP Server
        run: |
          ssh -i ~/.ssh/id_montana diretoria@104.196.22.170 "mkdir -p /opt/montana/mcp-server"
          scp -i ~/.ssh/id_montana mcp-server/mcp_server.py diretoria@104.196.22.170:/opt/montana/mcp-server/
          scp -i ~/.ssh/id_montana mcp-server/requirements.txt diretoria@104.196.22.170:/opt/montana/mcp-server/

      - name: Instalar dependências e reiniciar
        run: |
          ssh -i ~/.ssh/id_montana diretoria@104.196.22.170 \
            "cd /opt/montana/app_unificado && npm install --production 2>&1 | tail -3 && pm2 restart montana-app && \
             pip3 install -r /opt/montana/mcp-server/requirements.txt --break-system-packages -q 2>&1 | tail -2 && \
             pm2 restart montana-mcp && pm2 save"

      - name: Verificar status
        run: |
          ssh -i ~/.ssh/id_montana diretoria@104.196.22.170 "pm2 status"
